<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW S1000RR Dashboard (Accurate)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        
        #dashboard {
            width: 800px;
            height: 480px;
            background: linear-gradient(135deg, #0a1628 0%, #1a2840 100%);
            border-radius: 20px;
            position: relative;
            box-shadow: 0 0 60px rgba(0, 100, 200, 0.4);
            overflow: hidden;
        }
        
        /* Top fuel/range bar */
        #topBar {
            position: absolute;
            top: 20px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #fuelIndicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        #fuelIcon {
            color: #FFD700;
            font-size: 20px;
        }
        
        #fuelBar {
            width: 120px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }
        
        #fuelLevel {
            height: 100%;
            background: linear-gradient(90deg, #00FF00, #FFD700);
            transition: width 0.3s;
        }
        
        #rangeText {
            color: #FFD700;
            font-size: 16px;
            margin-left: 5px;
        }
        
        /* RPM Bar */
        #rpmBar {
            position: absolute;
            top: 80px;
            left: 50px;
            right: 50px;
            height: 60px;
        }
        
        #rpmScale {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            color: #888;
            font-size: 18px;
            font-weight: bold;
        }
        
        .rpm-tick {
            text-align: center;
            min-width: 30px;
        }
        
        .rpm-tick.redline {
            color: #FF0000;
        }
        
        #rpmBarBg {
            width: 100%;
            height: 30px;
            background: #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            border: 2px solid #333;
        }
        
        #rpmBarFill {
            height: 100%;
            background: linear-gradient(90deg, #00FF88, #00DD88, #88FF00, #FFDD00);
            width: 0%;
            transition: width 0.1s, background 0.1s;
            border-radius: 13px;
        }
        
        #rpmBarFill.redzone {
            background: linear-gradient(90deg, #FF0000, #FF4400, #FF0000);
        }
        
        #rpmLabel {
            position: absolute;
            bottom: 5px;
            left: 50px;
            color: #888;
            font-size: 12px;
        }
        
        /* Speed Display */
        #speedDisplay {
            position: absolute;
            top: 180px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        
        #speedValue {
            color: #FFFFFF;
            font-size: 140px;
            font-weight: 900;
            line-height: 1;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            letter-spacing: -5px;
        }
        
        #speedUnit {
            color: #888;
            font-size: 28px;
            margin-top: -10px;
        }
        
        /* Warning lights (right side) */
        #warningLights {
            position: absolute;
            top: 180px;
            right: 40px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .warning-icon {
            width: 35px;
            height: 35px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            background: #333;
            opacity: 0.3;
        }
        
        .warning-icon.active {
            opacity: 1;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Time display */
        #timeDisplay {
            position: absolute;
            bottom: 30px;
            right: 40px;
            color: #888;
            font-size: 20px;
        }
        
        /* Bottom info */
        #bottomInfo {
            position: absolute;
            bottom: 40px;
            left: 50px;
            right: 200px;
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .info-label {
            color: #666;
            font-size: 14px;
        }
        
        .info-value {
            color: #00DDFF;
            font-size: 22px;
            font-weight: bold;
        }
        
        .info-value.warning {
            color: #FF0000;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
        
        /* BMW Logo */
        #bmwLogo {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: #444;
            font-size: 24px;
        }
        
        /* High beam indicator */
        #highBeam {
            position: absolute;
            top: 180px;
            left: 40px;
            color: #0088FF;
            font-size: 40px;
            opacity: 0;
        }
        
        #highBeam.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="dashboard">
        <!-- Top Bar -->
        <div id="topBar">
            <div id="fuelIndicator">
                <span id="fuelIcon">⛽</span>
                <div id="fuelBar">
                    <div id="fuelLevel" style="width: 75%;"></div>
                </div>
                <span id="rangeText">--- km</span>
            </div>
        </div>
        
        <!-- RPM Bar -->
        <div id="rpmBar">
            <div id="rpmScale">
                <span class="rpm-tick">0</span>
                <span class="rpm-tick">1</span>
                <span class="rpm-tick">2</span>
                <span class="rpm-tick">3</span>
                <span class="rpm-tick">4</span>
                <span class="rpm-tick">5</span>
                <span class="rpm-tick">6</span>
                <span class="rpm-tick">7</span>
                <span class="rpm-tick redline">●</span>
                <span class="rpm-tick redline">●</span>
                <span class="rpm-tick redline">●</span>
            </div>
            <div id="rpmBarBg">
                <div id="rpmBarFill"></div>
            </div>
            <div id="rpmLabel">RPM x1000</div>
        </div>
        
        <!-- High Beam -->
        <div id="highBeam">⬤</div>
        
        <!-- Speed Display -->
        <div id="speedDisplay">
            <div id="speedValue">0</div>
            <div id="speedUnit">km/h</div>
        </div>
        
        <!-- Warning Lights -->
        <div id="warningLights">
            <div class="warning-icon" id="warnTriangle">⚠️</div>
            <div class="warning-icon" id="warnEngine">🔧</div>
            <div class="warning-icon" id="warnTemp">🌡️</div>
            <div class="warning-icon" id="warnOil">🛢️</div>
        </div>
        
        <!-- Time -->
        <div id="timeDisplay">03:49 PM</div>
        
        <!-- Bottom Info -->
        <div id="bottomInfo">
            <div class="info-item">
                <div class="info-label">H₂O</div>
                <div class="info-value" id="waterTemp">75.0°C</div>
            </div>
            <div class="info-item">
                <div class="info-label">Intake</div>
                <div class="info-value" id="intakeTemp">25.0°C</div>
            </div>
            <div class="info-item">
                <div class="info-label">TPS</div>
                <div class="info-value" id="throttle">0%</div>
            </div>
        </div>
        
        <!-- BMW Logo -->
        <div id="bmwLogo">⚡</div>
    </div>

    <script>
        // Simulation variables
        let rpm = 0;
        let speed = 0;
        let waterTemp = 75.0;
        let intakeTemp = 25.0;
        let throttle = 0;
        let fuel = 75;
        let range = 250;
        
        let rpmDirection = 1;
        
        function updateDashboard() {
            // Simulate RPM changes
            rpm += rpmDirection * (Math.random() * 300 + 100);
            
            if (rpm >= 14000) {
                rpmDirection = -1;
            } else if (rpm <= 1000) {
                rpmDirection = 1;
            }
            
            rpm = Math.max(0, Math.min(15000, rpm));
            
            // Calculate derived values
            speed = Math.round(rpm / 100);
            throttle = Math.round((rpm / 15000) * 100);
            waterTemp = 75 + (rpm / 15000) * 30;
            intakeTemp = 25 + (throttle / 100) * 25;
            
            // Update RPM bar
            const rpmPercent = (rpm / 15000) * 100;
            const rpmBarFill = document.getElementById('rpmBarFill');
            rpmBarFill.style.width = rpmPercent + '%';
            
            // Change color in redzone (12000+ RPM)
            if (rpm >= 12000) {
                rpmBarFill.classList.add('redzone');
            } else {
                rpmBarFill.classList.remove('redzone');
            }
            
            // Update speed
            document.getElementById('speedValue').textContent = speed;
            
            // Update water temp (warning if > 95°C)
            const waterTempEl = document.getElementById('waterTemp');
            waterTempEl.textContent = waterTemp.toFixed(1) + '°C';
            if (waterTemp > 95) {
                waterTempEl.classList.add('warning');
                document.getElementById('warnTemp').classList.add('active');
            } else {
                waterTempEl.classList.remove('warning');
                document.getElementById('warnTemp').classList.remove('active');
            }
            
            // Update intake temp
            document.getElementById('intakeTemp').textContent = intakeTemp.toFixed(1) + '°C';
            
            // Update throttle
            document.getElementById('throttle').textContent = throttle + '%';
            
            // Update fuel and range
            fuel = Math.max(10, fuel - 0.01);
            range = Math.round((fuel / 100) * 350);
            document.getElementById('fuelLevel').style.width = fuel + '%';
            document.getElementById('rangeText').textContent = range + ' km';
            
            // Update time
            const now = new Date();
            const hours = now.getHours() % 12 || 12;
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
            document.getElementById('timeDisplay').textContent = hours + ':' + minutes + ' ' + ampm;
        }
        
        // Update every 100ms
        setInterval(updateDashboard, 100);
        updateDashboard();
    </script>
</body>
</html>
