<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW S1000RR Dashboard (Enhanced)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        
        #dashboard {
            width: 800px;
            height: 480px;
            background: linear-gradient(135deg, #0a1628 0%, #1a2840 100%);
            border-radius: 20px;
            position: relative;
            box-shadow: 0 0 60px rgba(0, 100, 200, 0.4);
            overflow: hidden;
        }
        
        /* Top fuel/range bar */
        #topBar {
            position: absolute;
            top: 20px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #fuelIndicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        #fuelIcon {
            color: #FFD700;
            font-size: 20px;
        }
        
        #fuelBar {
            width: 120px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }
        
        #fuelLevel {
            height: 100%;
            background: linear-gradient(90deg, #00FF00, #FFD700);
            transition: width 0.3s;
        }
        
        #rangeText {
            color: #FFD700;
            font-size: 16px;
            margin-left: 5px;
        }
        
        /* RPM Bar with segments */
        #rpmBar {
            position: absolute;
            top: 80px;
            left: 50px;
            right: 50px;
            height: 80px;
        }
        
        #rpmScale {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            color: #888;
            font-size: 18px;
            font-weight: bold;
        }
        
        .rpm-tick {
            text-align: center;
            min-width: 30px;
        }
        
        .rpm-tick.redline {
            color: #FF0000;
        }
        
        /* Segmented RPM bar */
        #rpmSegments {
            display: flex;
            gap: 3px;
            height: 35px;
            align-items: flex-end;
        }
        
        .rpm-segment {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            transition: background 0.1s;
            clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);
        }
        
        .rpm-segment.active {
            background: linear-gradient(180deg, #00FF88, #00DD88);
        }
        
        .rpm-segment.active.yellow {
            background: linear-gradient(180deg, #FFDD00, #FFB800);
        }
        
        .rpm-segment.active.red {
            background: linear-gradient(180deg, #FF0000, #CC0000);
            animation: pulse-red 0.5s infinite;
        }
        
        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        #rpmLabel {
            position: absolute;
            bottom: 5px;
            left: 50px;
            color: #888;
            font-size: 12px;
        }
        
        /* Speed Display with hexagon frame */
        #speedContainer {
            position: absolute;
            top: 180px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        
        #speedFrame {
            width: 280px;
            height: 180px;
            background: linear-gradient(135deg, rgba(20, 40, 80, 0.4), rgba(10, 30, 60, 0.6));
            clip-path: polygon(
                20% 0%, 80% 0%, 
                100% 30%, 100% 70%, 
                80% 100%, 20% 100%, 
                0% 70%, 0% 30%
            );
            border: 2px solid rgba(100, 150, 255, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 30px rgba(0, 100, 200, 0.2);
        }
        
        #speedValue {
            color: #FFFFFF;
            font-size: 120px;
            font-weight: 900;
            line-height: 1;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            letter-spacing: -5px;
        }
        
        #speedUnit {
            color: #888;
            font-size: 24px;
            margin-top: -5px;
        }
        
        /* Warning lights */
        #warningLights {
            position: absolute;
            top: 180px;
            right: 40px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .warning-icon {
            width: 35px;
            height: 35px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            background: #333;
            opacity: 0.3;
        }
        
        .warning-icon.active {
            opacity: 1;
            animation: pulse 1s infinite;
            background: #FF8800;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Time display */
        #timeDisplay {
            position: absolute;
            bottom: 30px;
            right: 40px;
            color: #888;
            font-size: 20px;
        }
        
        /* Bottom info */
        #bottomInfo {
            position: absolute;
            bottom: 40px;
            left: 50px;
            right: 200px;
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .info-label {
            color: #666;
            font-size: 14px;
        }
        
        .info-value {
            color: #00DDFF;
            font-size: 22px;
            font-weight: bold;
        }
        
        .info-value.warning {
            color: #FF0000;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
        
        /* BMW style logo/icon */
        #bmwIcon {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            border: 3px solid #444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 20px;
            font-weight: bold;
        }
        
        /* High beam indicator */
        #highBeam {
            position: absolute;
            top: 180px;
            left: 40px;
            color: #0088FF;
            font-size: 40px;
            opacity: 0;
        }
        
        #highBeam.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="dashboard">
        <!-- Top Bar -->
        <div id="topBar">
            <div id="fuelIndicator">
                <span id="fuelIcon">⛽</span>
                <div id="fuelBar">
                    <div id="fuelLevel" style="width: 75%;"></div>
                </div>
                <span id="rangeText">--- km</span>
            </div>
        </div>
        
        <!-- RPM Bar -->
        <div id="rpmBar">
            <div id="rpmScale">
                <span class="rpm-tick">0</span>
                <span class="rpm-tick">1</span>
                <span class="rpm-tick">2</span>
                <span class="rpm-tick">3</span>
                <span class="rpm-tick">4</span>
                <span class="rpm-tick">5</span>
                <span class="rpm-tick">6</span>
                <span class="rpm-tick">7</span>
                <span class="rpm-tick redline">●</span>
                <span class="rpm-tick redline">●</span>
                <span class="rpm-tick redline">●</span>
            </div>
            <div id="rpmSegments">
                <!-- 30 segments for 0-15000 RPM -->
            </div>
            <div id="rpmLabel">RPM x1000</div>
        </div>
        
        <!-- High Beam -->
        <div id="highBeam">⬤</div>
        
        <!-- Speed Display with Frame -->
        <div id="speedContainer">
            <div id="speedFrame">
                <div id="speedValue">0</div>
                <div id="speedUnit">km/h</div>
            </div>
        </div>
        
        <!-- Warning Lights -->
        <div id="warningLights">
            <div class="warning-icon" id="warnTriangle">⚠️</div>
            <div class="warning-icon" id="warnEngine">🔧</div>
            <div class="warning-icon" id="warnTemp">🌡️</div>
            <div class="warning-icon" id="warnOil">🛢️</div>
        </div>
        
        <!-- Time -->
        <div id="timeDisplay">03:49 PM</div>
        
        <!-- Bottom Info -->
        <div id="bottomInfo">
            <div class="info-item">
                <div class="info-label">H₂O</div>
                <div class="info-value" id="waterTemp">75.0°C</div>
            </div>
            <div class="info-item">
                <div class="info-label">Intake</div>
                <div class="info-value" id="intakeTemp">25.0°C</div>
            </div>
            <div class="info-item">
                <div class="info-label">TPS</div>
                <div class="info-value" id="throttle">0%</div>
            </div>
        </div>
        
        <!-- BMW Icon -->
        <div id="bmwIcon">⚡</div>
    </div>

    <script>
        // Create RPM segments
        const segmentCount = 30;
        const rpmSegments = document.getElementById('rpmSegments');
        for (let i = 0; i < segmentCount; i++) {
            const segment = document.createElement('div');
            segment.className = 'rpm-segment';
            segment.dataset.index = i;
            rpmSegments.appendChild(segment);
        }
        
        // Simulation variables
        let rpm = 0;
        let speed = 0;
        let waterTemp = 75.0;
        let intakeTemp = 25.0;
        let throttle = 0;
        let fuel = 75;
        let range = 250;
        
        let rpmDirection = 1;
        
        function updateRPMSegments(currentRPM) {
            const segments = document.querySelectorAll('.rpm-segment');
            const activeCount = Math.floor((currentRPM / 15000) * segmentCount);
            
            segments.forEach((segment, index) => {
                const rpmValue = (index / segmentCount) * 15000;
                
                if (index < activeCount) {
                    segment.classList.add('active');
                    
                    // Color coding
                    if (rpmValue >= 12000) {
                        segment.classList.add('red');
                        segment.classList.remove('yellow');
                    } else if (rpmValue >= 10000) {
                        segment.classList.add('yellow');
                        segment.classList.remove('red');
                    } else {
                        segment.classList.remove('red', 'yellow');
                    }
                } else {
                    segment.classList.remove('active', 'red', 'yellow');
                }
            });
        }
        
        function updateDashboard() {
            // Simulate RPM changes
            rpm += rpmDirection * (Math.random() * 300 + 100);
            
            if (rpm >= 14000) {
                rpmDirection = -1;
            } else if (rpm <= 1000) {
                rpmDirection = 1;
            }
            
            rpm = Math.max(0, Math.min(15000, rpm));
            
            // Calculate derived values
            speed = Math.round(rpm / 100);
            throttle = Math.round((rpm / 15000) * 100);
            waterTemp = 75 + (rpm / 15000) * 30;
            intakeTemp = 25 + (throttle / 100) * 25;
            
            // Update RPM segments
            updateRPMSegments(rpm);
            
            // Update speed
            document.getElementById('speedValue').textContent = speed;
            
            // Update water temp
            const waterTempEl = document.getElementById('waterTemp');
            waterTempEl.textContent = waterTemp.toFixed(1) + '°C';
            if (waterTemp > 95) {
                waterTempEl.classList.add('warning');
                document.getElementById('warnTemp').classList.add('active');
            } else {
                waterTempEl.classList.remove('warning');
                document.getElementById('warnTemp').classList.remove('active');
            }
            
            // Update intake temp
            document.getElementById('intakeTemp').textContent = intakeTemp.toFixed(1) + '°C';
            
            // Update throttle
            document.getElementById('throttle').textContent = throttle + '%';
            
            // Update fuel and range
            fuel = Math.max(10, fuel - 0.01);
            range = Math.round((fuel / 100) * 350);
            document.getElementById('fuelLevel').style.width = fuel + '%';
            document.getElementById('rangeText').textContent = range + ' km';
            
            // Update time
            const now = new Date();
            const hours = now.getHours() % 12 || 12;
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
            document.getElementById('timeDisplay').textContent = hours + ':' + minutes + ' ' + ampm;
        }
        
        // Update every 100ms
        setInterval(updateDashboard, 100);
        updateDashboard();
    </script>
</body>
</html>
