<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW S1000RR Dashboard Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        
        #dashboard {
            width: 800px;
            height: 480px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            border: 2px solid #333;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 0 40px rgba(32, 128, 255, 0.3);
        }
        
        /* RPM Arc */
        #rpmCanvas {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        
        /* RPM Digital */
        #rpmDigital {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        
        /* Speed */
        #speed {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        
        #speedUnit {
            font-size: 20px;
            color: #888;
            margin-left: 5px;
        }
        
        /* Water Temp */
        #waterTemp {
            position: absolute;
            bottom: 80px;
            left: 30px;
            color: #40B0FF;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(64, 176, 255, 0.5);
        }
        
        /* Intake Temp */
        #intakeTemp {
            position: absolute;
            bottom: 40px;
            left: 30px;
            color: #40FF80;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(64, 255, 128, 0.5);
        }
        
        /* Throttle */
        #throttle {
            position: absolute;
            bottom: 40px;
            right: 30px;
            color: #FFFF00;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.5);
        }
        
        /* Warning indicator */
        .warning {
            color: #FF0000 !important;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div id="dashboard">
        <canvas id="rpmCanvas" width="350" height="350"></canvas>
        <div id="rpmDigital">0</div>
        <div id="speed">0 <span id="speedUnit">km/h</span></div>
        <div id="waterTemp">H₂O: 75.0°C</div>
        <div id="intakeTemp">Intake: 25.0°C</div>
        <div id="throttle">TPS: 0%</div>
    </div>

    <script>
        const canvas = document.getElementById('rpmCanvas');
        const ctx = canvas.getContext('2d');
        
        // Simulation variables
        let rpm = 0;
        let speed = 0;
        let waterTemp = 75.0;
        let intakeTemp = 25.0;
        let throttle = 0;
        
        let rpmDirection = 1;
        
        function drawRPMArc(value) {
            const centerX = 175;
            const centerY = 175;
            const radius = 140;
            const lineWidth = 15;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background arc
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, Math.PI * 0.75, Math.PI * 0.25, false);
            ctx.strokeStyle = '#303030';
            ctx.lineWidth = lineWidth;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // Calculate angle based on RPM (0-15000)
            const startAngle = Math.PI * 0.75;
            const maxAngle = Math.PI * 0.25;
            const totalAngle = (maxAngle - startAngle + 2 * Math.PI) % (2 * Math.PI);
            const currentAngle = startAngle + (value / 15000) * totalAngle;
            
            // Determine color based on RPM
            let color;
            if (value >= 12000) {
                color = '#FF0000'; // Red zone
            } else if (value >= 10000) {
                color = '#FF8800'; // Orange
            } else {
                color = '#2080FF'; // Blue
            }
            
            // Active arc
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, startAngle, currentAngle, false);
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // Draw tick marks
            for (let i = 0; i <= 15; i++) {
                const angle = startAngle + (i / 15) * totalAngle;
                const tickRadius = radius + 20;
                const tickLength = (i % 3 === 0) ? 15 : 8;
                
                const x1 = centerX + Math.cos(angle) * tickRadius;
                const y1 = centerY + Math.sin(angle) * tickRadius;
                const x2 = centerX + Math.cos(angle) * (tickRadius + tickLength);
                const y2 = centerY + Math.sin(angle) * (tickRadius + tickLength);
                
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = '#666';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Draw numbers
                if (i % 3 === 0) {
                    const numRadius = tickRadius + 30;
                    const numX = centerX + Math.cos(angle) * numRadius;
                    const numY = centerY + Math.sin(angle) * numRadius;
                    
                    ctx.fillStyle = '#888';
                    ctx.font = '14px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(i.toString(), numX, numY);
                }
            }
        }
        
        function updateDashboard() {
            // Simulate RPM changes
            rpm += rpmDirection * (Math.random() * 200 + 50);
            
            if (rpm >= 14000) {
                rpmDirection = -1;
            } else if (rpm <= 1000) {
                rpmDirection = 1;
            }
            
            rpm = Math.max(0, Math.min(15000, rpm));
            
            // Calculate derived values
            speed = Math.round(rpm / 100);
            throttle = Math.round((rpm / 15000) * 100);
            waterTemp = 75 + (rpm / 15000) * 25; // Simulate temp rise
            intakeTemp = 25 + (throttle / 100) * 20;
            
            // Update display
            drawRPMArc(rpm);
            document.getElementById('rpmDigital').textContent = Math.round(rpm);
            document.getElementById('speed').innerHTML = `${speed} <span id="speedUnit">km/h</span>`;
            
            const waterTempEl = document.getElementById('waterTemp');
            waterTempEl.textContent = `H₂O: ${waterTemp.toFixed(1)}°C`;
            if (waterTemp > 95) {
                waterTempEl.classList.add('warning');
            } else {
                waterTempEl.classList.remove('warning');
            }
            
            document.getElementById('intakeTemp').textContent = `Intake: ${intakeTemp.toFixed(1)}°C`;
            document.getElementById('throttle').textContent = `TPS: ${throttle}%`;
        }
        
        // Initial draw
        drawRPMArc(0);
        
        // Update every 100ms
        setInterval(updateDashboard, 100);
    </script>
</body>
</html>
